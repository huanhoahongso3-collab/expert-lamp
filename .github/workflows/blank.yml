name: Decompile Hermes Bundle
on:
  workflow_dispatch:

jobs:
  decompile-hermes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install hbctool
        run: pip install hbctool

      - name: Disassemble Hermes Bytecode
        run: |
          # hbctool disassembles the binary bundle into a readable instruction folder
          hbctool disassemble ./index.android.bundle ./decompiled_output
        
      - name: Upload Instructions
        uses: actions/upload-artifact@v4
        with:
          name: hermes-instructions
          path: decompiled_output/
