name: Decompile Hermes v96
on:
  workflow_dispatch:

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Hermes Tools
        run: |
          # Download the official Hermes CLI tools for Linux
          wget https://github.com/facebook/hermes/releases/download/v0.13.0/hermes-cli-linux-v0.13.0.tar.gz
          tar -xvf hermes-cli-linux-v0.13.0.tar.gz

      - name: Disassemble Bundle
        run: |
          # Use the official disassembler
          # This creates a human-readable assembly file (.hasm)
          ./hermes-dis ./index.android.bundle -out locket_disassembled.hasm

      - name: Extract Strings (The most useful part)
        run: |
          # Strings often contain the API endpoints and logic names
          grep -oP '(?<=")[^"]+(?=")' locket_disassembled.hasm > locket_strings.txt || true

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: locket-source-analysis
          path: |
            locket_disassembled.hasm
            locket_strings.txt
