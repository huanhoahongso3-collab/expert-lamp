name: Decompile Hermes v96
on:
  workflow_dispatch:

jobs:
  decompile-v96:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install hermes-python
        run: pip install hermes-python

      - name: Extract Strings and Bytecode
        run: |
          # This script uses the library to dump the readable strings
          # which usually contains the API keys and logic metadata.
          python3 -c "
          import hermes;
          with open('./index.android.bundle', 'rb') as f:
              hbc = hermes.HBC(f.read());
              print(f'HBC Version: {hbc.version}');
              for i, s in enumerate(hbc.strings):
                  print(f'String {i}: {s}')
          " > strings_output.txt
        
      - name: Upload Strings
        uses: actions/upload-artifact@v4
        with:
          name: locket-strings
          path: strings_output.txt
