name: Decompile Android Bundle
on:
  workflow_dispatch:

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS Beautifier
        run: npm install -g js-beautify

      - name: Format Bundle
        run: |
          # This will take the minified code and add indentation/newlines
          js-beautify ./index.android.bundle -o ./readable_index.js

      - name: Upload Readable Code
        uses: actions/upload-artifact@v4
        with:
          name: formatted-js
          path: readable_index.js
